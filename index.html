<!DOCTYPE html>
<html>
<head>
    <title>AI Medical Detection</title>
</head>
<body>

<h2>Upload Image</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Predict</button>
</form>

{% if image %}
    <h3>Uploaded Image:</h3>
    <img src="{{ image }}" width="200">
{% endif %}

{% if result %}
    <h3>Result: {{ result }}</h3>
{% endif %}

</body>
</html>
